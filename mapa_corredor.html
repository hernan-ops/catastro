<style>
:root{ --bw-blue:#0d6ea8; }
/* --- chips de etiqueta --- */
.bw-chip{font:600 12.5px/1.35 system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;background:rgba(255,255,255,.86);

.bw-chip.river{font-style:italic;font-weight:500;font-size:11px;color:#0b3d61;
 background:rgba(225,240,255,.86)}
.bw-chip.ruta{font-size:11px;font-weight:800;color:#fff}
.bw-chip.town{font-weight:700;font-size:11.5px}
.bw-chip.small{font-size:10px;font-weight:600;padding:1px 5px}
.bw-chip.lot{color:#fff;border:none;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.4)}
/* etiquetas de lote: ocultas hasta acercar el zoom */
.bw-lotlabel{display:none}
body.bw-zoomed .bw-lotlabel{display:block}
/* --- pin numerado --- */
.bw-pin{width:26px;height:26px;border-radius:50%;border:2px solid #fff;
 box-shadow:0 1px 4px rgba(0,0,0,.45);color:#fff;font:800 13px/22px system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
 text-align:center}
.bw-bolt{font-size:13px;line-height:18px;width:18px;height:18px;text-align:center;
 background:#e8b500;color:#3a2c00;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.4)}
/* --- barra superior --- */
.bw-top{position:fixed;top:0;left:0;right:0;z-index:10000;display:flex;
 align-items:center;justify-content:space-between;gap:12px;
 padding:8px 16px;background:rgba(17,28,38,.92);backdrop-filter:blur(6px);
 color:#fff;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.35)}
.bw-left{display:flex;align-items:center;gap:14px;min-width:0}
.bw-back{flex:none;text-decoration:none;color:#dfe7ee;border:1px solid rgba(255,255,255,.22);
 background:rgba(255,255,255,.06);font:700 12.5px system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:5px 12px;border-radius:8px;transition:.15s}
.bw-back:hover{background:rgba(255,255,255,.16);color:#fff}
.bw-brand{font-size:14px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.bw-brand b{font-weight:800}
.bw-brand span{opacity:.7;font-weight:500;margin-left:6px;font-size:12.5px}
.bw-views{display:flex;gap:6px}
.bw-v{cursor:pointer;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);
 color:#dfe7ee;font:600 12.5px system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:5px 12px;border-radius:8px;transition:.15s}
.bw-v:hover{background:rgba(255,255,255,.16);color:#fff}
.bw-v.active{background:#1f8fd0;border-color:#1f8fd0;color:#fff;box-shadow:0 1px 6px rgba(31,143,208,.5)}
/* la barra empuja el contenido del mapa hacia abajo */
.leaflet-top{margin-top:46px}
/* --- leyenda compacta --- */
.bw-leg{position:fixed;bottom:16px;left:16px;z-index:9999;background:#fff;
 border-radius:11px;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.22);
 border:1px solid #e3e6ea;overflow:hidden;max-width:268px}
.bw-leg-h{cursor:pointer;padding:9px 13px;font-weight:700;font-size:12.5px;color:#1a2733;

.bw-leg-x{transition:.2s;font-size:10px;color:#789}
.bw-leg.collapsed .bw-leg-b{display:none}

.bw-leg-r{display:flex;align-items:center;gap:8px;padding:2.5px 0}

.bw-sw.dot{width:11px;height:11px;border-radius:50%}
.bw-sw.line{height:0;border-radius:0;box-shadow:none;border-top:3px solid}
.bw-leg-note{margin-top:7px;font-size:10px;color:#7a8893;line-height:1.45}

.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 6px 22px rgba(0,0,0,.28)}
.leaflet-popup-content{margin:0;width:auto!important}
.bw-pop{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12.5px;color:#26303a;min-width:194px}
.bw-pop .h{font-weight:800;font-size:13.5px;color:#fff;padding:8px 12px;border-radius:12px 12px 0 0}
.bw-pop .b{padding:9px 12px 11px}
.bw-pop .r{display:flex;justify-content:space-between;gap:14px;padding:3px 0;border-bottom:1px solid #eef1f3}
.bw-pop .r:last-child{border-bottom:none}
.bw-pop .r .k{color:#7a8893;font-weight:500}
.bw-pop .r .v{font-weight:700;text-align:right}
.bw-pop .note{font-size:10.5px;color:#b4543a;margin-top:7px;line-height:1.4}
.bw-pop .coord{font-size:10.5px;color:#9aa7b1;margin-top:5px;font-variant-numeric:tabular-nums}
