const map=new maplibregl.Map({
  container:'map', hash:false, maxPitch:80, antialias:true,
  center:VIEWS.todo.c, zoom:VIEWS.todo.z, pitch:VIEWS.todo.p, bearing:VIEWS.todo.b,
  style:{version:8, glyphs:'https://basemaps.cartocdn.com/gl/positron-gl-style/glyphs/{fontstack}/{range}.pbf',
    sources:{

         'horizon-fog-blend':0.6,'fog-color':'#dfeaf3','fog-ground-blend':0.7}
  }
});

map.addControl(new maplibregl.TerrainControl({source:'terrarium', exaggeration:1.5}),'top-right');
map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-right');

function fly(key,btn){
  const v=VIEWS[key];
  document.querySelectorAll('#views .bw-v').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  map.flyTo({center:v.c, zoom:v.z, pitch:v.p, bearing:v.b, duration:4000, curve:1.5, essential:true});
}
// botones de vuelo
const vc=document.getElementById('views');
Object.keys(VIEWS).forEach(k=>{
  const b=document.createElement('button'); b.className='bw-v'+(k==='todo'?' active':'');
  b.textContent=VIEWS[k].label; b.onclick=()=>fly(k,b); vc.appendChild(b);
});
const a2d=document.createElement('a'); a2d.className='bw-v link'; a2d.href='mapa_master.html';
a2d.textContent='🗺️ Mapa 2D'; vc.appendChild(a2d);

map.on('load',()=>{
  // polígonos de lote (drapeados sobre el terreno)
  map.addSource('lotes',{type:'geojson', data:LOTES});
  map.addLayer({id:'lote-fill', type:'fill', source:'lotes',
    paint:{'fill-color':['get','color'],'fill-opacity':0.35}});
  map.addLayer({id:'lote-line', type:'line', source:'lotes',
    paint:{'line-color':['get','color'],'line-width':3}});
  // pin + etiqueta + popup por lote
  LOTES.features.forEach(f=>{
    const p=f.properties;
    const el=document.createElement('div'); el.className='lot-pin';
    el.innerHTML='<div class="lot-lab" style="background:'+p.color+'">'+p.circ+' '+p.nombre+
      ' · '+(p.sup)+' ha</div><div class="lot-dot" style="background:'+p.color+'">'+p.num+'</div>';
    const sv=p.sv?'<a class="sv" href="'+p.sv+'" target="_blank" rel="noopener">🛣️ Ver en Street View</a>':'';
    const html='<div class="pop-h" style="background:'+p.color+'">'+p.circ+' '+p.nombre+'</div>'+
      '<div class="pop-b"><div class="r"><span class="k">Zona</span><span class="v">'+p.zona+'</span></div>'+
      '<div class="r"><span class="k">Superficie</span><span class="v">'+p.sup+' ha</span></div>'+
      '<div class="r"><span class="k">💧 Agua</span><span class="v">'+p.agua+'</span></div>'+
      '<div class="r"><span class="k">⛰️ Cota</span><span class="v">'+p.cota.toFixed(0)+' m · '+p.pend+'°</span></div>'+
      '<div class="r"><span class="k">🏛️ Dominio</span><span class="v">'+p.dominio+'</span></div>'+sv+'</div>';
    new maplibregl.Marker({element:el, anchor:'bottom'}).setLngLat([p.lon,p.lat])
      .setPopup(new maplibregl.Popup({offset:26, maxWidth:'260px'}).setHTML(html))
      .addTo(map);
  });
});
map.on('idle',()=>{const l=document.getElementById('load'); if(l)l.classList.add('hide');});
setTimeout(()=>{const l=document.getElementById('load'); if(l)l.classList.add('hide');},6000);
